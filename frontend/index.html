<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural ASCII</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: hidden;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Ambient CRT vignette overlay */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.8) 100%);
            z-index: 10;
            pointer-events: none;
        }

        /* CRT Scanlines and chromatic aberration overlay */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            z-index: 20;
            pointer-events: none;
        }

        /* Green Phosphor Glow Text Style */
        #ascii-stream {
            margin: 0;
            padding: 0;
            color: #00ff66;
            text-shadow: 0 0 4px rgba(0, 255, 102, 0.5), 0 0 10px rgba(0, 255, 102, 0.2);
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            line-height: 12px;
            letter-spacing: 0px;
            font-weight: bold;
            white-space: pre;
            display: block;
            text-align: left;
        }

        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px;
            height: 480px;
            opacity: 0.01;
            z-index: -100;
            pointer-events: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>

<body>
    <video id="webcam" autoplay playsinline muted width="640" height="480"></video>
    <pre id="ascii-stream">BOOTING...</pre>

    <script src="app.js"></script>
</body>

</html>
